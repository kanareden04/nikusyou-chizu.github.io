<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手掛かり</title>
    <style>
        /* 全体の余白をゼロにする */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* スクロールバーを出さない */
            background-color: #1a1a1a; /* 背景色（お好みで） */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 画像の設定（ここがレスポンシブの肝） */
        img {
            /* 画面の幅と高さ、どちらか小さい方に合わせて最大サイズを制限 */
            max-width: 100%;
            max-height: 100%;
            /* 縦横比を維持したまま、画面内に収める */
            object-fit: contain;
            /* 読み込みをスムーズにする（任意） */
            display: block;
        }
    </style>
</head>
<body>

    <img src="A.png" alt="地図">

</body>
</html>
